<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الشرق - الكباتن (الإصدار التفاعلي)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #020617; color: #fff; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        /* حركات الذكاء الاصطناعي والمسح الضوئي */
        .scanner-line { width: 100%; height: 2px; background: #10b981; position: absolute; top: 0; left: 0; box-shadow: 0 0 20px #10b981; animation: scan 2s infinite linear; }
        @keyframes scan { 0% { top: 0; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        .pulse-glow { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 30px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // مفاتيحك الحقيقية
        const firebaseConfig = {
            apiKey: "AIzaSyCDEDHjFR3VZXjuYemEX3qXdVLOe5T4QiM",
            authDomain: "sharq-logistics.firebaseapp.com",
            projectId: "sharq-logistics",
            storageBucket: "sharq-logistics.firebasestorage.app",
            messagingSenderId: "589414129711",
            appId: "1:589414129711:web:5a8748384299afa968a6da"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // ------------------ مكون البطاقة الرقمية الفخمة ------------------
        const DriverIDCard = ({ driver }) => (
            <div className="relative p-1 bg-gradient-to-br from-emerald-400 via-emerald-200 to-emerald-600 rounded-[3rem] shadow-[0_0_50px_rgba(16,185,129,0.3)] overflow-hidden max-w-sm w-full mx-auto">
                <div className="absolute inset-0 bg-slate-900/80 backdrop-blur-md"></div>
                <div className="bg-slate-900 rounded-[2.9rem] p-8 relative z-10 border border-white/10 text-center">
                    <div className="w-24 h-24 bg-slate-800 rounded-3xl border-2 border-emerald-400 flex items-center justify-center mx-auto mb-6 pulse-glow">
                        <i className="fas fa-user text-4xl text-emerald-500"></i>
                    </div>
                    <h3 className="text-3xl font-black mb-1 text-white">{driver.fullName}</h3>
                    <p className="text-emerald-400 text-xs font-bold uppercase tracking-widest mb-6 border-b border-white/10 pb-4">الكابتن المعتمد رقم - {driver.id.substring(0,5)}</p>
                    
                    <div className="grid grid-cols-2 gap-4 mb-8">
                        <div className="bg-slate-800/80 p-4 rounded-2xl border border-white/5">
                            <p className="text-[10px] text-emerald-300 mb-1">المركبة</p>
                            <p className="font-bold text-sm text-white">{driver.carBrand}</p>
                        </div>
                        <div className="bg-slate-800/80 p-4 rounded-2xl border border-white/5">
                            <p className="text-[10px] text-emerald-300 mb-1">اللوحة</p>
                            <p className="font-bold text-sm text-white">{driver.plateNumber}</p>
                        </div>
                    </div>
                    
                    <div className="bg-white p-4 rounded-3xl inline-block shadow-2xl mb-4">
                        <i className="fas fa-qrcode text-6xl text-slate-900"></i>
                    </div>
                    <p className="text-[9px] text-slate-500 font-black tracking-widest uppercase mt-2">
                        <i className="fas fa-robot text-emerald-500 mr-1"></i> تم الإصدار بواسطة ذكاء الشرق
                    </p>
                </div>
            </div>
        );
        // -------------------------------------------------------------------

        const App = () => {
            const [view, setView] = useState('driver_auth'); 
            const [drivers, setDrivers] = useState([]);
            const [activeDriver, setActiveDriver] = useState(null);

            useEffect(() => {
                const unsubscribe = db.collection('drivers').onSnapshot(snapshot => {
                    const driversData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setDrivers(driversData);
                });
                return () => unsubscribe();
            }, []);

            // 1. بوابة التسجيل والدخول للكباتن
            const DriverAuth = () => {
                const [mode, setMode] = useState('login'); 
                const [loading, setLoading] = useState(false);
                const [regData, setRegData] = useState({ fullName: '', gender: 'ذكر', nationality: '', mobile: '', email: '', dob: '', city: '', district: '', carBrand: '', carYear: '', plateNumber: '', password: '', confirmPassword: '' });

                const handleRegister = async (e) => {
                    e.preventDefault();
                    if (regData.password !== regData.confirmPassword) return alert("كلمات المرور غير متطابقة");
                    setLoading(true);
                    try {
                        await db.collection('drivers').add({
                            ...regData, status: 'قيد المراجعة', createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        setMode('success');
                    } catch (error) { alert("خطأ: " + error.message); }
                    setLoading(false);
                };

                const handleLogin = (e) => {
                    e.preventDefault();
                    const mobile = e.target.mobile.value;
                    const pass = e.target.pass.value;
                    const found = drivers.find(d => d.mobile === mobile && d.password === pass);
                    if (found) {
                        if (found.status === 'معتمد') { setActiveDriver(found); setView('driver_dash'); } 
                        else { alert("حسابك مسجل ولكنه قيد المراجعة من الإدارة."); }
                    } else { alert("رقم الجوال أو كلمة المرور غير صحيحة."); }
                };

                if (mode === 'success') return (
                    <div className="min-h-screen flex items-center justify-center p-6 text-center">
                        <div className="glass-card rounded-[2rem] max-w-md p-12 w-full">
                            <div className="w-24 h-24 bg-emerald-500/20 rounded-full flex items-center justify-center mx-auto mb-8 pulse-glow"><i className="fas fa-check text-4xl text-emerald-500"></i></div>
                            <h2 className="text-3xl font-black mb-4">تم الاستلام بنجاح</h2>
                            <p className="text-slate-400 leading-relaxed mb-10">تم حفظ بياناتك. سيقوم النظام الذكي بتنسيق بطاقتك وتفعيلها قريباً من الإدارة.</p>
                            <button onClick={() => setMode('login')} className="w-full bg-emerald-500 text-slate-900 font-black py-4 rounded-2xl">العودة لشاشة الدخول</button>
                        </div>
                    </div>
                );

                return (
                    <div className="min-h-screen flex items-center justify-center p-6">
                        {mode === 'login' ? (
                            <div className="glass-card rounded-[2.5rem] w-full max-w-sm p-10 text-center relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-emerald-500/10 rounded-full blur-2xl"></div>
                                <div className="w-20 h-20 bg-emerald-500 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-2xl shadow-emerald-500/20 relative z-10"><i className="fas fa-car text-3xl text-slate-900"></i></div>
                                <h1 className="text-3xl font-black mb-2 relative z-10">بوابة الكباتن</h1>
                                <p className="text-slate-500 text-xs mb-8 uppercase tracking-widest relative z-10">Sharq Logistics</p>
                                <form onSubmit={handleLogin} className="space-y-4 relative z-10">
                                    <input name="mobile" required placeholder="رقم الجوال" className="w-full bg-slate-900/50 border border-white/10 rounded-2xl p-4 text-white outline-none focus:border-emerald-500 text-right" dir="ltr" />
                                    <input name="pass" required type="password" placeholder="كلمة المرور" className="w-full bg-slate-900/50 border border-white/10 rounded-2xl p-4 text-white outline-none focus:border-emerald-500 text-right" />
                                    <button className="w-full bg-emerald-500 text-slate-900 font-black py-5 rounded-2xl text-lg hover:bg-emerald-400 transition-all mt-6 shadow-xl shadow-emerald-500/20">دخول النظام</button>
                                </form>
                                <div className="mt-8 border-t border-white/5 pt-6 relative z-10">
                                    <button onClick={() => setMode('register')} className="text-slate-400 text-sm">ليس لديك حساب؟ <span className="text-emerald-500 font-black underline">سجل كابتن جديد</span></button>
                                    <button onClick={() => setView('admin_login')} className="block w-full mt-6 text-[10px] text-slate-600 font-bold uppercase hover:text-white transition">دخول الإدارة المركزية</button>
                                </div>
                            </div>
                        ) : (
                            <div className="glass-card rounded-[2.5rem] w-full max-w-3xl p-10 max-h-[90vh] overflow-y-auto custom-scrollbar text-right">
                                <div className="flex justify-between items-center mb-10 border-b border-white/5 pb-6">
                                    <button onClick={() => setMode('login')} className="w-10 h-10 bg-white/5 rounded-full flex items-center justify-center text-emerald-500 hover:bg-white/10"><i className="fas fa-chevron-right"></i></button>
                                    <h2 className="text-2xl font-black text-emerald-500">تسجيل كابتن جديد</h2>
                                    <div className="w-10"></div>
                                </div>
                                <form onSubmit={handleRegister} className="grid grid-cols-1 md:grid-cols-2 gap-6 text-right">
                                    <div className="md:col-span-2"><h3 className="text-emerald-500 font-bold flex items-center gap-2"><i className="fas fa-user"></i> البيانات الشخصية</h3></div>
                                    <input required placeholder="الاسم الكامل (كما في الهوية)" className="bg-slate-900/50 border border-white/10 p-4 rounded-2xl outline-none focus:border-emerald-500" onChange={e => setRegData({...regData, fullName: e.target.value})} />
                                    <input required placeholder="الجنسية" className="bg-slate-900/50 border border-white/10 p-4 rounded-2xl outline-none focus:border-emerald-500" onChange={e => setRegData({...regData, nationality: e.target.value})} />
                                    <input required type="date" className="bg-slate-900/50 border border-white/10 p-4 rounded-2xl outline-none focus:border-emerald-500 text-slate-400" onChange={e => setRegData({...regData, dob: e.target.value})} />
                                    <input required placeholder="رقم الجوال (05xxxxxxxx)" type="tel" dir="ltr" className="bg-slate-900/50 border border-white/10 p-4 rounded-2xl outline-none focus:border-emerald-500" onChange={e => setRegData({...regData, mobile: e.target.value})} />
                                    <input required placeholder="المدينة" className="bg-slate-900/50 border border-white/10 p-4 rounded-2xl outline-none focus:border-emerald-500" onChange={e => setRegData({...regData, city: e.target.value})} />
                                    <input required placeholder="الحي" className="bg-slate-900/50 border border-white/10 p-4 rounded-2xl outline-none focus:border-emerald-500" onChange={e => setRegData({...regData, district: e.target.value})} />

                                    <div className="md:col-span-2 mt-4"><h3 className="text-emerald-500 font-bold flex items-center gap-2"><i className="fas fa-car"></i> بيانات المركبة</h3></div>
                                    <input required placeholder="نوع السيارة (مثال: كيا كرنفال)" className="bg-slate-900/50 border border-white/10 p-4 rounded-2xl outline-none focus:border-emerald-500" onChange={e => setRegData({...regData, carBrand: e.target.value})} />
                                    <input required placeholder="رقم اللوحة (أ ب ج 1234)" className="bg-slate-900/50 border border-white/10 p-4 rounded-2xl outline-none focus:border-emerald-500" onChange={e => setRegData({...regData, plateNumber: e.target.value})} />

                                    <div className="md:col-span-2 mt-4"><h3 className="text-emerald-500 font-bold flex items-center gap-2"><i className="fas fa-lock"></i> كلمة المرور</h3></div>
                                    <input required placeholder="كلمة المرور" type="password" className="bg-slate-900/50 border border-white/10 p-4 rounded-2xl outline-none focus:border-emerald-500" onChange={e => setRegData({...regData, password: e.target.value})} />
                                    <input required placeholder="تأكيد كلمة المرور" type="password" className="bg-slate-900/50 border border-white/10 p-4 rounded-2xl outline-none focus:border-emerald-500" onChange={e => setRegData({...regData, confirmPassword: e.target.value})} />

                                    <button disabled={loading} className="md:col-span-2 bg-emerald-500 text-slate-900 font-black py-6 rounded-2xl text-xl mt-6 hover:bg-emerald-400 transition shadow-lg shadow-emerald-500/20">
                                        {loading ? 'جاري رفع البيانات...' : 'إرسال لتوليد البطاقة الذكية'}
                                    </button>
                                </form>
                            </div>
                        )}
                    </div>
                );
            };

            // 2. لوحة الكابتن (عند الدخول بنجاح)
            const DriverDash = () => {
                if (!activeDriver) return null;
                return (
                    <div className="min-h-screen p-6 text-right flex flex-col items-center">
                        <header className="w-full max-w-sm flex justify-between items-center mb-12">
                            <h2 className="text-xl font-black text-emerald-500"><i className="fas fa-id-badge mr-2"></i> هويتك الرقمية</h2>
                            <button onClick={() => {setActiveDriver(null); setView('driver_auth');}} className="w-10 h-10 bg-white/5 rounded-full text-red-400 flex items-center justify-center"><i className="fas fa-power-off"></i></button>
                        </header>
                        <DriverIDCard driver={activeDriver} />
                        <p className="mt-8 text-slate-500 text-sm text-center max-w-xs">هذه البطاقة معتمدة رسمياً. يمكنك إبراز الـ QR Code للعملاء للتحقق من هويتك.</p>
                    </div>
                );
            };

            // 3. الإدارة (الدخول)
            const AdminLogin = () => (
                <div className="min-h-screen flex items-center justify-center p-6 text-center">
                    <div className="glass-card w-full max-w-sm p-10 rounded-[2.5rem]">
                        <i className="fas fa-shield-alt text-6xl text-emerald-500 mb-6 block"></i>
                        <h2 className="text-2xl font-black mb-8">الإدارة المركزية</h2>
                        <input id="adminPin" type="password" placeholder="رمز الدخول (1234)" className="w-full bg-slate-900/50 border border-white/10 p-5 rounded-2xl text-center mb-6 outline-none focus:border-emerald-500" />
                        <button onClick={() => { if(document.getElementById('adminPin').value === '1234') setView('admin_dash'); else alert('الرمز خطأ'); }} className="w-full bg-emerald-500 text-slate-900 font-black py-4 rounded-2xl">دخول النظام</button>
                        <button onClick={() => setView('driver_auth')} className="mt-6 text-sm text-slate-500 hover:text-white">العودة لبوابة الكباتن</button>
                    </div>
                </div>
            );

            // 4. الإدارة (لوحة التحكم مع الذكاء الاصطناعي ومعاينة البطاقة)
            const AdminDash = () => {
                const [aiProcessingId, setAiProcessingId] = useState(null);
                const [viewCardModal, setViewCardModal] = useState(null);

                const approveAndGenerateCard = (driver) => {
                    // تشغيل حركات الذكاء الاصطناعي
                    setAiProcessingId(driver.id);
                    // محاكاة معالجة الذكاء الاصطناعي لمدة 3 ثواني
                    setTimeout(async () => {
                        await db.collection('drivers').doc(driver.id).update({ status: 'معتمد' });
                        setAiProcessingId(null);
                        alert("تم توليد البطاقة الرقمية بنجاح للكابتن: " + driver.fullName);
                    }, 3000);
                };

                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row text-right text-slate-900" dir="rtl">
                        <aside className="w-full md:w-72 bg-slate-900 text-white p-8 flex flex-col h-auto md:h-screen sticky top-0">
                            <h2 className="text-3xl font-black text-emerald-500 mb-12"><i className="fas fa-chart-pie mr-2"></i> إدارة الشرق</h2>
                            <div className="space-y-4 flex-grow">
                                <div className="bg-emerald-500 text-slate-900 p-4 rounded-2xl font-bold flex items-center gap-3"><i className="fas fa-users"></i> الكباتن المسجلين ({drivers.length})</div>
                            </div>
                            <button onClick={() => setView('admin_login')} className="mt-10 p-4 text-slate-400 hover:text-white flex items-center gap-2"><i className="fas fa-sign-out-alt"></i> تسجيل خروج</button>
                        </aside>

                        <main className="flex-1 p-8 md:p-12 overflow-y-auto relative">
                            <h2 className="text-4xl font-black mb-10 text-slate-800">إدارة الكباتن والبطاقات</h2>
                            
                            {/* نافذة معاينة البطاقة الرقمية (Popup) */}
                            {viewCardModal && (
                                <div className="fixed inset-0 bg-slate-950/90 backdrop-blur-sm z-50 flex flex-col items-center justify-center p-6">
                                    <button onClick={() => setViewCardModal(null)} className="absolute top-10 right-10 text-white text-4xl hover:text-red-500"><i className="fas fa-times"></i></button>
                                    <h3 className="text-white text-2xl font-bold mb-8">معاينة البطاقة المصدرة</h3>
                                    <DriverIDCard driver={viewCardModal} />
                                </div>
                            )}

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {drivers.map(d => (
                                    <div key={d.id} className="bg-white rounded-[2rem] shadow-lg border border-slate-200 overflow-hidden relative">
                                        
                                        {/* شاشة المسح الضوئي للذكاء الاصطناعي تظهر هنا عند الضغط على اعتماد */}
                                        {aiProcessingId === d.id && (
                                            <div className="absolute inset-0 bg-slate-900/90 backdrop-blur-md z-20 flex flex-col items-center justify-center text-white text-center p-6">
                                                <div className="w-full h-full absolute inset-0 border-4 border-emerald-500 rounded-[2rem] overflow-hidden">
                                                    <div className="scanner-line"></div>
                                                </div>
                                                <i className="fas fa-robot text-5xl text-emerald-500 mb-4 pulse-glow rounded-full"></i>
                                                <h4 className="font-black text-lg mb-2 text-emerald-400">الذكاء الاصطناعي يعمل</h4>
                                                <p className="text-xs text-slate-400">جاري قراءة البيانات وتوليد الـ QR Code والبطاقة الرقمية...</p>
                                            </div>
                                        )}

                                        <div className={`p-6 text-center ${d.status === 'معتمد' ? 'bg-emerald-50' : 'bg-slate-50'}`}>
                                            <div className="w-16 h-16 bg-white border border-slate-200 rounded-2xl flex items-center justify-center mx-auto mb-4"><i className="fas fa-user text-2xl text-slate-300"></i></div>
                                            <h3 className="font-bold text-xl">{d.fullName}</h3>
                                            <span className={`text-[10px] font-black uppercase px-3 py-1 rounded-full mt-2 inline-block ${d.status === 'معتمد' ? 'bg-emerald-500 text-white' : 'bg-amber-500 text-white'}`}>{d.status}</span>
                                        </div>
                                        <div className="p-6 space-y-3 text-sm">
                                            <div className="flex justify-between border-b border-slate-100 pb-2"><span className="text-slate-500 font-bold">الجوال:</span> <span className="font-bold">{d.mobile}</span></div>
                                            <div className="flex justify-between border-b border-slate-100 pb-2"><span className="text-slate-500 font-bold">السيارة:</span> <span className="font-bold">{d.carBrand}</span></div>
                                            <div className="flex justify-between border-b border-slate-100 pb-2"><span className="text-slate-500 font-bold">المرور:</span> <span className="font-bold text-emerald-600">{d.password}</span></div>
                                        </div>
                                        <div className="p-4 bg-slate-50 flex flex-col gap-2">
                                            {d.status !== 'معتمد' ? (
                                                <button onClick={() => approveAndGenerateCard(d)} className="w-full bg-slate-900 text-emerald-400 font-black py-4 rounded-xl hover:bg-black transition flex items-center justify-center gap-2">
                                                    <i className="fas fa-magic"></i> اعتماد وتوليد البطاقة بالذكاء
                                                </button>
                                            ) : (
                                                <button onClick={() => setViewCardModal(d)} className="w-full bg-emerald-500 text-white font-black py-4 rounded-xl flex items-center justify-center gap-2 hover:bg-emerald-600 shadow-md">
                                                    <i className="fas fa-id-card"></i> معاينة البطاقة الرقمية
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                ))}
                                {drivers.length === 0 && <p className="text-slate-500 col-span-full font-bold">لا يوجد كباتن مسجلين حتى الآن.</p>}
                            </div>
                        </main>
                    </div>
                );
            };

            if (view === 'driver_auth') return <DriverAuth />;
            if (view === 'driver_dash') return <DriverDash />;
            if (view === 'admin_login') return <AdminLogin />;
            if (view === 'admin_dash') return <AdminDash />;
            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
